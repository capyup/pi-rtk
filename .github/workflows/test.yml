name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install rtk
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)   ASSET=rtk-x86_64-unknown-linux-musl.tar.gz ;;
            Linux-ARM64) ASSET=rtk-aarch64-unknown-linux-gnu.tar.gz ;;
            macOS-X64)   ASSET=rtk-x86_64-apple-darwin.tar.gz ;;
            macOS-ARM64) ASSET=rtk-aarch64-apple-darwin.tar.gz ;;
            *) echo "Unsupported runner: ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
          esac
          mkdir -p "$HOME/.local/bin"
          cd "$RUNNER_TEMP"
          gh release download --repo rtk-ai/rtk --pattern "$ASSET"
          tar -xzf "$ASSET"
          install -m 0755 rtk "$HOME/.local/bin/rtk"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify rtk
        run: |
          which rtk
          rtk --version

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run unit + e2e + integration tests
        run: npm test

      - name: Smoke-run the effectiveness benchmark
        # Just verify the benchmark script executes end-to-end with a single
        # rep and no warmup; we do not gate CI on the numerical outcome.
        env:
          REPS: "1"
          WARMUP: "0"
          BENCH_QUIET: "1"
        run: npm run bench
